services:
  - type: web
    name: todo-list-django
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn todo_project.wsgi"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: todo-list-db
          property: connectionString

databases:
  - name: todo-list-db
    plan: free
    region: oregon
